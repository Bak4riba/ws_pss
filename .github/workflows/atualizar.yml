name: Atualizar dados PSS

on:
  schedule:
    - cron: '0 9,17 * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 pdfplumber

      - name: Rodar scraping
        run: python main.py

      - name: Commit e push do dados.json
        run: |
          git config user.name "github-actions"
          git config user.email "matheus.bakaus.bruno@github.com"
          git add dados.json
          git diff --cached --quiet || git commit -m "Atualiza dados.json $(date +'%d/%m/%Y %H:%M')"
          git push